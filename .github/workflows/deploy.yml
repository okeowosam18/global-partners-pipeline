name: Deploy Global Partners Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'glue/scripts/**'
      - 'dashboard/**'

jobs:
  deploy-glue-scripts:
    name: Deploy Glue Scripts to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-2

      - name: Upload Glue scripts to S3
        run: |
          aws s3 cp glue/scripts/bronze_job.py s3://global-partners-datalake/scripts/bronze_job.py
          aws s3 cp glue/scripts/silver_job.py s3://global-partners-datalake/scripts/silver_job.py
          aws s3 cp glue/scripts/gold_job.py   s3://global-partners-datalake/scripts/gold_job.py
          echo "✅ Glue scripts deployed to S3"

      - name: Upload dashboard to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ec2-user
          key:         ${{ secrets.EC2_SSH_KEY }}
          source:      dashboard/dashboard.py
          target:      /home/ec2-user/
          strip_components: 1

  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy-glue-scripts
    if: always()

    steps:
      - name: Print deployment status
        run: |
          if [ "${{ needs.deploy-glue-scripts.result }}" == "success" ]; then
            echo "✅ Deployment succeeded"
            echo "   Glue scripts → s3://global-partners-datalake/scripts/"
            echo "   Dashboard    → EC2 18.216.126.59:8501"
          else
            echo "❌ Deployment failed — check logs above"
          fi